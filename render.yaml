databases:
  - name: mehfil-db
    plan: free
    databaseName: mehfil
    user: mehfil

services:
  - type: web
    name: mehfil-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mehfil-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: SUPERADMIN_EMAILS
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: mehfil-web
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
